services:
  mysql:
    image: mysql:8.0
    container_name: hsk-webapp-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-hsk_webapp}
      MYSQL_USER: ${DB_USER:-hsk_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hsk_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: Asia/Ho_Chi_Minh
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
